# Client & Work
client_and_work:
  title: "Portfolio"
  enable: true

  enable_clients: false

  works:
    - title: "Mitochondrial Genome Analysis of Crab Clades"
      description: "An R Shiny application for comparative mitochondrial genomics of ghost crabs (Ocypode spp.) and fiddler crabs. Evaluates evolutionary divergence across 13 protein-coding genes using pairwise distance matrices, phylogenetic tree construction, dN/dS ratios, and Ti/Tv ratios."
      button:
        icon: "icon-arrow-right"
        btnText: "View on GitHub"
        URL: "https://github.com/marjoriekohn"
      image:
        x: "img/works/invertebrate_r.jpg"
        _2x: "img/works/invertebrate_r.jpg"
      is_even: true

    - title: "PheWAS of SPTLC3"
      description: "Designed and automated customizable Phenome-Wide Association Study analyses in Python using the All of Us Research Workbench. Implemented covariate generation and stratified cohort creation using Polars and PheTK, with reproducible workflows documented in Jupyter Notebook and Open Science Framework."
      button:
        icon: "icon-arrow-right"
        btnText: "View on OSF"
        URL: "#"
      image:
        x: "img/works/phewas.jpg"
        _2x: "img/works/phewas.jpg"
      is_even: false

    - title: "CDC Chronic Disease Indicators Analysis"
      description: "Analyzed the CDC Chronic Disease Indicators dataset in R to identify correlations between socioeconomic factors and public health outcomes. Built a dplyr pipeline aggregating state-level mortality and uninsurance rates, with ggplot2 linear regression visualizations."
      button:
        icon: "icon-arrow-right"
        btnText: "View on GitHub"
        URL: "https://github.com/marjoriekohn"
      image:
        x: "img/works/cdc_analysis.jpg"
        _2x: "img/works/cdc_analysis.jpg"
      is_even: true

