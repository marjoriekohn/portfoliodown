# about
about:
  enable: true
  title: "Who am I?"
  content:
    <p class="lead">
    <strong>I am a bioinformatics graduate student</strong> at Virginia Commonwealth University with a background
    in clinical laboratory science. I am passionate about applying computational analysis and data visualization
    to biological research and diagnostic decision-making.
    </p>
    <p class="lead">
    <strong>My focus</strong> is computational genomics and clinical data analytics — from genome-wide association
    studies and mitochondrial phylogenetics to building reproducible, automated analysis pipelines. I enjoy
    translating complex biological questions into rigorous, well-documented code.
    </p>
  button:
    icon: "icon-smile-fill"
    btnText: "About Me"
    URL: "https://www.linkedin.com/in/marjoriekohn"
  image:
    x: "img/who-am-i/mk-picture.jpg"
    _2x: "img/who-am-i/mk-picture.jpg"

